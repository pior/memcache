name: Benchmark

on:
  pull_request:
    paths-ignore:
      - '**.md'
  # Re-run on demand by commenting "/bench" on a pull request.
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  bench:
    name: Benchmark
    # Run for PR events, or for a "/bench" comment on a pull request.
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/bench'))
    runs-on: ubuntu-latest

    # Tunables, sized for a ~2 minute job (matching the parallel Stress job, so
    # this costs no extra wall-clock on the PR). main and the PR are measured
    # interleaved — one round each, alternating order — for BENCH_ROUNDS rounds,
    # so total work is roughly 2 x rounds x count x operations. Rounds are the
    # lever that fights the *between-window* host drift a shared runner shows;
    # they matter more than a bigger count, which only shrinks within-round
    # variance with diminishing returns.
    env:
      BENCH_COUNT: '10000'
      BENCH_CONCURRENCY: '8'
      BENCH_ROUNDS: '10'
      # Pairing each round cancels the common-mode noise that forced a generous
      # threshold before, and the comparison also withholds the flag when a
      # delta is smaller than its own run-to-run scatter — so we can flag at a
      # tighter ±% without crying wolf.
      BENCH_THRESHOLD: '10'

    services:
      memcached:
        image: memcached:latest
        ports:
          - 11211:11211
        options: >-
          --health-cmd "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/11211'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Acknowledge /bench comment
      if: github.event_name == 'issue_comment'
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh api "repos/$GITHUB_REPOSITORY/issues/comments/${{ github.event.comment.id }}/reactions" -f content=eyes

    # Resolve the PR head and base commits from whichever event triggered us, so
    # the rest of the job is identical for push and /bench runs.
    - name: Resolve PR commits
      id: pr
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
        else
          num="${{ github.event.issue.number }}"
          echo "number=$num" >> "$GITHUB_OUTPUT"
          gh pr view "$num" --repo "$GITHUB_REPOSITORY" --json headRefOid,baseRefOid \
            --jq '"head=\(.headRefOid)\nbase=\(.baseRefOid)"' >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout PR head
      uses: actions/checkout@v6
      with:
        ref: ${{ steps.pr.outputs.head }}
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    # Build the PR's bench harness against the PR library. The same harness is
    # reused for the baseline below, so the only thing that varies between the
    # two measurements is the memcache library itself.
    - name: Build PR benchmark
      working-directory: cmd/bench
      run: go build -o "$RUNNER_TEMP/bench-pr" .

    # Rebuild the same harness against main's library, via a replace pointing at
    # a worktree of the base commit. Both binaries therefore differ only in the
    # library version, and both run on this same runner, so host speed cancels
    # out of the comparison.
    - name: Build baseline benchmark
      working-directory: cmd/bench
      run: |
        git worktree add "$RUNNER_TEMP/base-src" "${{ steps.pr.outputs.base }}"
        go mod edit -replace github.com/pior/memcache="$RUNNER_TEMP/base-src"
        go mod tidy
        go build -o "$RUNNER_TEMP/bench-base" .

    # Interleave the two builds round by round: within each round both run back
    # to back, so they share that round's host conditions and can be compared
    # paired. Alternate which build goes first so neither side is systematically
    # advantaged (warm page cache, a within-round trend). Each invocation does a
    # single suite pass (-runs 1); aggregation across rounds happens in compare.
    - name: Run interleaved rounds (main vs PR)
      run: |
        common=(-count "$BENCH_COUNT" -concurrency "$BENCH_CONCURRENCY" -runs 1 -format json)
        base_files=()
        pr_files=()
        for i in $(seq 1 "$BENCH_ROUNDS"); do
          b="$RUNNER_TEMP/base.$i.json"
          p="$RUNNER_TEMP/pr.$i.json"
          if [ $((i % 2)) -eq 0 ]; then
            "$RUNNER_TEMP/bench-base" "${common[@]}" > "$b"
            "$RUNNER_TEMP/bench-pr"   "${common[@]}" > "$p"
          else
            "$RUNNER_TEMP/bench-pr"   "${common[@]}" > "$p"
            "$RUNNER_TEMP/bench-base" "${common[@]}" > "$b"
          fi
          base_files+=("$b")
          pr_files+=("$p")
          echo "round $i/$BENCH_ROUNDS complete"
        done
        IFS=,
        echo "BASE_FILES=${base_files[*]}" >> "$GITHUB_ENV"
        echo "PR_FILES=${pr_files[*]}" >> "$GITHUB_ENV"

    - name: Build comparison
      run: |
        "$RUNNER_TEMP/bench-pr" \
          -baseline "$BASE_FILES" -compare "$PR_FILES" \
          -threshold "$BENCH_THRESHOLD" > "$RUNNER_TEMP/comment.md"
        {
          echo ""
          echo "<sub>Re-run this benchmark by commenting \`/bench\` on the PR.</sub>"
        } >> "$RUNNER_TEMP/comment.md"

    # Forked-PR push events get a read-only token, so skip the comment there to
    # avoid a failing step; same-repo pushes and /bench comments can post.
    - name: Post comparison comment
      if: >-
        github.event_name == 'issue_comment' ||
        github.event.pull_request.head.repo.full_name == github.repository
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: benchmark
        number: ${{ steps.pr.outputs.number }}
        path: ${{ runner.temp }}/comment.md
