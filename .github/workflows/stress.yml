name: Stress

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      duration:
        description: Duration of each stress scenario
        default: 10s
      workers:
        description: Concurrent workers per scenario
        default: '16'

jobs:
  stress:
    name: Stress
    runs-on: ubuntu-latest

    services:
      memcached:
        image: memcached:latest
        ports:
          - 11211:11211
        options: >-
          --health-cmd "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/11211'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Download dependencies
      run: go mod download
      working-directory: stress

    - name: Run stress suite
      run: go test -race -v -run TestStress ./...
      working-directory: stress
      env:
        STRESS_DURATION: ${{ inputs.duration || '10s' }}
        STRESS_WORKERS: ${{ inputs.workers || '16' }}
