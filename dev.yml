# DevBuddy config file
# See https://github.com/devbuddy/devbuddy/blob/master/docs/Config.md

env:
  ENV: development

up:
  - go:
      version: 1.25.3
      modules: true
  # - custom:
  #     name: Install golangci-lint
  #     met?: which golangci-lint && golangci-lint --version | grep -q '2.1.6'
  #     meet: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.1.6
  # - memcached

commands:
  ci:
    desc: Run all CI checks
    run: go mod tidy -diff && golangci-lint run && go test -v -race ./...

  test:
    desc: Run all tests
    run: go test -v ./...

  test-integration:
    desc: Run integration tests (requires memcached on 127.0.0.1:11211)
    run: go test -v -run TestIntegration ./...

  test-stress:
    desc: Run stress/load tests (requires memcached; STRESS_DURATION and STRESS_WORKERS to tune)
    run: go test -tags stress -race -v -run TestStress .

  test-client:
    desc: Run client unit tests only
    run: go test -v -run '^TestClient_' .

  test-meta:
    desc: Run meta protocol tests
    run: go test -v ./meta

  bench:
    desc: Run client benchmarks
    run: go test -bench=BenchmarkClient -benchmem -run=^$ .

  bench-meta:
    desc: Run pool benchmarks (both channel and puddle)
    run: go test -bench=Benchmark -benchmem -run=^$ ./meta

  bench-pool:
    desc: Run pool benchmarks (both channel and puddle)
    run: go test -bench=BenchmarkPool -benchmem -run=^$ .

  fuzz-read:
    desc: Fuzz ReadResponse parser for 60 seconds
    run: go test -fuzz='^FuzzReadResponse$' -fuzztime=60s ./meta

  fuzz-batch:
    desc: Fuzz ReadResponseBatch for 60 seconds
    run: go test -fuzz='^FuzzReadResponseBatch$' -fuzztime=60s ./meta
  lint:
    desc: Lint the project
    run: golangci-lint run

  loadtest-test:
    desc: Test the tier-3 loadtest module
    run: cd loadtest && go test ./...

  loadtest-smoke:
    desc: Run loadgen locally against memcached (requires docker compose up)
    run: cd loadtest && go run ./cmd/loadgen -servers 127.0.0.1:11211 -profile efficiency -duration 30s

  loadtest-pool-smoke:
    desc: Multi-address pooling smoke (run 'docker compose --profile pool up -d' first)
    run: cd loadtest && go run ./cmd/loadgen -servers 127.0.0.1:11211,127.0.0.1:11212,127.0.0.1:11213 -profile top-perf -workers 24 -duration 20s

  loadtest-dryrun:
    desc: Preview a tier-3 cloud run without touching GCP
    run: cd loadtest && go run ./cmd/orchestrator dry-run -placement global -clients 3 -servers 3 -instances-per-vm 2 -duration 1h -bucket gs://demo

open:
  devbuddy: https://github.com/devbuddy/devbuddy/blob/master/docs/Config.md#config-devyml
